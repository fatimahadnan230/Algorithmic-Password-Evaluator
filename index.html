<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithmic Password Evaluator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.js"></script>
    
    <script>
      window.onload = function() {
        stlite.mount(
          {
            /* REMOVED PYARROW: Stops the browser from searching for uncompilable C++ wheels */
            requirements: ["pandas", "numpy", "plotly"],
            entrypoint: "app.py",
            files: {
              "app.py": `
import streamlit as st
import math
from collections import Counter
import plotly.express as px
import pandas as pd

st.set_page_config(page_title="Password Evaluator", layout="wide")

st.markdown("""
    <style>
    .stApp { background-color: #0f172a !important; color: #f1f5f9 !important; font-family: sans-serif; }
    [data-testid="stMetricValue"] { color: #ffffff !important; font-weight: 700 !important; }
    section[data-testid="stSidebar"] { background-color: #0b1329 !important; }
    .threat-matrix { width: 100%; border-collapse: collapse; margin: 15px 0; background-color: #0f172a; border: 1px solid #1e293b; }
    .threat-matrix th { background-color: #1e293b; color: #38bdf8; padding: 12px; text-align: left; }
    .threat-matrix td { padding: 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    </style>
""", unsafe_allow_html=True)

st.markdown('<h1 style="color: #ef4444; font-weight: 900;">🔐 Algorithmic Password Evaluator</h1>', unsafe_allow_html=True)

def analyze_password(password):
    if not password:
        return 0.0, {}, "EMPTY", "🚨 NO DATA INPUTTED", "#ef4444"
    normalized = password.strip().lower()
    top_leaked = ["123456", "password", "123456789", "qwerty", "unknown"]
    sequential_runs = ["0123456789", "9876543210", "abcdefghijklmnopqrstuvwxyz"]
    is_sequential = any(normalized in run for run in sequential_runs) if len(normalized) >= 3 else False

    n = len(password)
    counts = Counter(password)
    entropy = 0.0
    for char, count in counts.items():
        prob = count / n
        entropy -= prob * math.log2(prob)
        
    if normalized in top_leaked:
        return round(entropy, 2), counts, "CRITICAL WEAKNESS", "🚨 MATCHED KNOWN LEAK SIGNATURE", "#ef4444"
    elif is_sequential:
        return round(entropy, 2), counts, "CRITICAL WEAKNESS", "🚨 SEQUENTIAL PATTERN PENALTY", "#ef4444"
    elif entropy < 2.5:
        return round(entropy, 2), counts, "CRITICAL WEAKNESS", "🔴 Highly predictable pattern.", "#ef4444"
    elif entropy < 3.5:
        return round(entropy, 2), counts, "MODERATE EXPOSURE", "🟡 Standard alphanumeric structure.", "#f59e0b"
    else:
        return round(entropy, 2), counts, "CRYPTOGRAPHICALLY SECURE", "🟢 Excellent randomness density.", "#10b981"

user_input = st.sidebar.text_input("ENTER TARGET STRING:", value="123456", type="password")

if user_input:
    entropy_score, char_counts, status_tier, feedback, status_color = analyze_password(user_input)
    st.markdown(f'<div style="background: #1e293b; border-left: 4px solid {status_color}; padding: 20px; margin-bottom: 20px;"><h3>{status_tier}</h3><p>{feedback}</p></div>', unsafe_allow_html=True)
    
    col1, col2, col3 = st.columns(3)
    col1.metric("Shannon Entropy", f"{entropy_score} Bits")
    col2.metric("Payload Length", f"{len(user_input)} Chars")
    col3.metric("Unique Tokens", f"{len(char_counts)}")
`
            }
          },
          document.getElementById("root")
        );
      };
    </script>
  </body>
</html>
