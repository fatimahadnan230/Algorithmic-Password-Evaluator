<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithmic Password Evaluator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.js"></script>
    <script>
      fetch("app.py")
        .then((response) => response.text())
        .then((code) => {
          stlite.mount(
            {
              requirements: ["pandas", "numpy", "plotly", "pyarrow"],
              entrypoint: "app.py",
              files: {
                "app.py": code,
              },
            },
            document.getElementById("root")
          );
        });
    </script>
  </body>
</html>
